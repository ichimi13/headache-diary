<body>

<div id="offline-banner">オフラインモード</div>

<div id="header">
  <div id="header-sub">HEADACHE DIARY</div>
  <div id="header-title">頭痛ダイアリー</div>
  <div id="tabs">
    <button class="tab-btn active" onclick="showTab('record')">📝 記録する</button>
    <button class="tab-btn" onclick="showTab('summary')">📊 まとめ</button>
  </div>
</div>

<div id="content"></div>

<script>
var IL = ["なし","軽度 ＋","中程度 ＋＋","重度 ＋＋＋"];
var IC = ["#e8f5e9","#fff9c4","#ffe0b2","#ffcdd2"];
var IT = ["#388e3c","#f9a825","#e65100","#c62828"];
var BC = ["#e5e7eb","#fde68a","#fdba74","#fca5a5"];

var SYMPTOMS = [
  {id:"throbbing",label:"💓 脈打つ痛み"},
  {id:"heavy",label:"🪨 重い痛み"},
  {id:"nausea",label:"🤢 吐き気・嘔吐"},
  {id:"light",label:"💡 光過敏"},
  {id:"sound",label:"🔊 音過敏"},
  {id:"aura",label:"✨ 前兆あり"}
];
var MEDS = [
  {id:"loxonin",label:"ロキソニン"},
  {id:"bufferin",label:"バファリン"},
  {id:"imigran",label:"イミグラン"},
  {id:"zomig",label:"ゾーミック"},
  {id:"maxalt",label:"マクサルト"},
  {id:"ibu",label:"イブ"},
  {id:"alinamin",label:"アリナミン"},
  {id:"yunker",label:"ユンケル"},
  {id:"other",label:"その他"}
];
var TIMING = [
  {id:"morning",label:"🌅 朝"},
  {id:"afternoon",label:"☀️ 昼"},
  {id:"evening",label:"🌙 夜"}
];
var EFFECTS = [
  {id:"much_better",label:"かなり良くなった",color:"#16a34a",bg:"#dcfce7"},
  {id:"little_better",label:"少し良くなった",color:"#ca8a04",bg:"#fef9c3"},
  {id:"no_change",label:"変わらない",color:"#9ca3af",bg:"#f3f4f6"}
];
var TRIGGERS = [
  {id:"sleep",label:"睡眠不足"},
  {id:"stress",label:"ストレス"},
  {id:"weather",label:"天気・気圧"},
  {id:"alcohol",label:"飲酒"},
  {id:"period",label:"生理"},
  {id:"screen",label:"画面疲れ"},
  {id:"skip_meal",label:"食事抜き"},
  {id:"unknown",label:"不明"}
];
var IMPACTS = [
  {id:"none",label:"影響なし"},
  {id:"slight",label:"少し支障あり"},
  {id:"moderate",label:"かなり支障あり"},
  {id:"severe",label:"寝込んだ"}
];

var SK = "headache_diary_v1";
var tab = "record";
var selDate = todayStr();
var entries = load();
var entry = clone(entries[selDate] || empty());

function todayStr() { return new Date().toISOString().slice(0,10); }
function empty() { return {morning:0,afternoon:0,evening:0,symptoms:[],medEntries:[],triggers:[],impact:"",memo:""}; }
function clone(o) { return JSON.parse(JSON.stringify(o)); }
function load() { try { return JSON.parse(localStorage.getItem(SK)||"{}"); } catch(e) { return {}; } }
function save() { try { localStorage.setItem(SK,JSON.stringify(entries)); } catch(e) {} }
function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function find(arr,id) { for(var i=0;i<arr.length;i++) if(arr[i].id===id) return arr[i]; return null; }

function render() {
  document.getElementById("content").innerHTML = tab==="record" ? recHTML() : sumHTML();
  bind();
}

function recHTML() {
  var h = "";
  h += "<div class='card'><div id='date-row'>";
  h += "<span style='font-size:20px'>📅</span><div id='date-col'>";
  h += "<div id='date-sublabel'>記録する日付</div>";
  h += "<input type='date' id='date-input' value='"+esc(selDate)+"'></div>";
  h += "<span id='date-saved-badge' style='"+(entries[selDate]?"display:inline":"")+"'>記録済</span>";
  h += "</div></div>";

  h += "<div class='card-form'>";

  // 痛みの程度
  h += "<div class='section'><div class='section-title'>痛みの程度</div>";
  h += intRow("morning","朝",entry.morning);
  h += intRow("afternoon","昼",entry.afternoon);
  h += intRow("evening","夜",entry.evening);
  h += "</div>";

  // 症状
  h += "<div class='section'><div class='section-title'>症状</div><div class='chip-group'>";
  for(var i=0;i<SYMPTOMS.length;i++) {
    var s=SYMPTOMS[i]; var on=entry.symptoms.indexOf(s.id)>=0;
    h += "<button class='chip"+(on?" on":"")+"' data-chip='symptom' data-id='"+s.id+"'>"+s.label+"</button>";
  }
  h += "</div></div>";

  // 服薬
  h += "<div class='section'><div class='section-title'>服薬</div>";
  h += "<div class='chip-group' style='margin-bottom:14px'>";
  for(var i=0;i<MEDS.length;i++) {
    var m=MEDS[i]; var on=false;
    for(var j=0;j<entry.medEntries.length;j++) if(entry.medEntries[j].medId===m.id){on=true;break;}
    h += "<button class='chip"+(on?" on":"")+"' data-chip='med' data-id='"+m.id+"'>"+(on?"✓ ":"")+esc(m.label)+"</button>";
  }
  h += "</div><div id='med-cards'>"+medCardsHTML()+"</div></div>";

  // 誘因
  h += "<div class='section'><div class='section-title'>考えられる誘因</div><div class='chip-group'>";
  for(var i=0;i<TRIGGERS.length;i++) {
    var t=TRIGGERS[i]; var on=entry.triggers.indexOf(t.id)>=0;
    h += "<button class='chip"+(on?" on":"")+"' data-chip='trigger' data-id='"+t.id+"'>"+t.label+"</button>";
  }
  h += "</div></div>";

  // 影響
  h += "<div class='section'><div class='section-title'>日常生活への影響</div><div class='chip-group'>";
  for(var i=0;i<IMPACTS.length;i++) {
    var im=IMPACTS[i]; var on=entry.impact===im.id;
    h += "<button class='chip single"+(on?" on":"")+"' data-chip='impact' data-id='"+im.id+"'>"+im.label+"</button>";
  }
  h += "</div></div>";

  // メモ
  h += "<div class='section'><div class='section-title'>自由メモ</div>";
  h += "<textarea id='memo-input' rows='3' placeholder='その他気になること、医師への伝言など...'>"+esc(entry.memo)+"</textarea>";

h += “</div>”;

h += “<button id='save-btn' onclick='doSave()'>💾 この日の記録を保存</button>”;
h += “</div><div style='height:20px'></div>”;
return h;
}

function intRow(field,label,val) {
var h = “<div class='intensity-row'><div class='intensity-label'>”+label+”</div><div class='intensity-btns'>”;
for(var i=0;i<IL.length;i++) {
var on=val===i;
h += “<button class='intensity-btn' style='background:"+IC[i]+";color:"+IT[i]+";border-color:"+(on?IT[i]:"transparent")+";font-weight:"+(on?"800":"500")+"' data-int='"+field+"' data-val='"+i+"'>”+IL[i]+”</button>”;
}
h += “</div></div>”;
return h;
}

function medCardsHTML() {
var h=””;
for(var i=0;i<entry.medEntries.length;i++) h+=medCardHTML(entry.medEntries[i]);
return h;
}

function medCardHTML(m) {
var med=find(MEDS,m.medId); var label=med?med.label:m.medId;
var h=”<div class='med-card' id='mc-"+m.medId+"'>”;
h+=”<div class='med-card-header'><span class='med-card-title'>💊 “+esc(label)+”</span>”;
h+=”<button class='med-remove' data-rm='"+m.medId+"'>×</button></div>”;
h+=”<div class='sub-label'>服薬タイミング</div><div class='timing-btns'>”;
for(var i=0;i<TIMING.length;i++) {
var t=TIMING[i]; var on=m.timing.indexOf(t.id)>=0;
h+=”<button class='timing-btn"+(on?" on":"")+"' data-tim='"+m.medId+"' data-tid='"+t.id+"'>”+t.label+”</button>”;
}
h+=”</div><div class='sub-label'>服薬後の効果</div><div class='effect-btns'>”;
for(var i=0;i<EFFECTS.length;i++) {
var ef=EFFECTS[i]; var on=m.effect===ef.id;
h+=”<button class='effect-btn' style='border-color:"+(on?ef.color:"#e5e7eb")+";background:"+(on?ef.bg:"#fff")+";color:"+(on?ef.color:"#6b7280")+";font-weight:"+(on?"800":"400")+"' data-eff='"+m.medId+"' data-eid='"+ef.id+"'>”+ef.label+”</button>”;
}
h+=”</div></div>”;
return h;
}

function sumHTML() {
var dates=Object.keys(entries).sort();
var h=”<div class='card-form'>”;
if(!dates.length) {
h+=”<div class='empty'>まだ記録がありません</div>”;
} else {
h+=”<div class='cal-title'>📅 カレンダー概要</div><div class='cal-grid'>”;
for(var i=0;i<dates.length;i++) {
var d=dates[i]; var e=entries[d];
var mx=Math.max(e.morning,e.afternoon,e.evening);
h+=”<div class='cal-cell' style='background:"+BC[mx]+";color:"+(mx===0?"#9ca3af":"#374151")+"'>”+d.slice(8)+”<span>”+d.slice(5,7)+“月</span></div>”;
}
h+=”</div><div class='cal-legend'>”;
for(var i=0;i<IL.length;i++) h+=”<span><span class='legend-dot' style='background:"+BC[i]+"'></span>”+IL[i]+”</span>”;
h+=”</div><div class='sum-title'>📋 記録一覧</div>”;
for(var di=dates.length-1;di>=0;di–) {
var d=dates[di]; var e=entries[d];
var mx=Math.max(e.morning,e.afternoon,e.evening);
h+=”<div class='entry-card' style='border-left:4px solid "+IT[mx]+"'>”;
h+=”<div class='entry-header'><span class='entry-date'>”+esc(d)+”</span>”;
h+=”<span class='entry-badge' style='background:"+IC[mx]+";color:"+IT[mx]+"'>最大: “+IL[mx]+”</span></div>”;
h+=”<div class='entry-times'><span>朝 “+IL[e.morning]+”</span><span>昼 “+IL[e.afternoon]+”</span><span>夜 “+IL[e.evening]+”</span></div>”;
if(e.symptoms&&e.symptoms.length){var sl=[];for(var i=0;i<e.symptoms.length;i++){var s=find(SYMPTOMS,e.symptoms[i]);if(s)sl.push(s.label);}h+=”<div class='entry-row'>症状: “+esc(sl.join(”・”))+”</div>”;}
if(e.medEntries&&e.medEntries.length){var ml=[];for(var i=0;i<e.medEntries.length;i++){var m=e.medEntries[i];var med=find(MEDS,m.medId);var nm=med?med.label:m.medId;var tl=[];for(var j=0;j<m.timing.length;j++){var t=find(TIMING,m.timing[j]);if(t)tl.push(t.label);}var ef=find(EFFECTS,m.effect);var p=nm+(tl.length?”（”+tl.join(”・”)+”）”:””)+(ef?“→”+ef.label:””);ml.push(p);}h+=”<div class='entry-row'>薬: “+esc(ml.join(” / “))+”</div>”;}
if(e.triggers&&e.triggers.length){var tl=[];for(var i=0;i<e.triggers.length;i++){var t=find(TRIGGERS,e.triggers[i]);if(t)tl.push(t.label);}h+=”<div class='entry-row'>誘因: “+esc(tl.join(”・”))+”</div>”;}
if(e.impact){var im=find(IMPACTS,e.impact);if(im)h+=”<div class='entry-row'>日常への影響: “+esc(im.label)+”</div>”;}
if(e.memo)h+=”<div class='entry-memo'>”+esc(e.memo)+”</div>”;
h+=”</div>”;
}
}
h+=”</div><button id='export-btn' onclick='doExport()'>📄 テキストに書き出す（医師へ）</button>”;
h+=”<div style='height:20px'></div>”;
return h;
}

function bind() {
var di=document.getElementById(“date-input”);
if(di) di.addEventListener(“change”,function(e){selDate=e.target.value;entry=clone(entries[selDate]||empty());render();});

var ib=document.querySelectorAll(”[data-int]”);
for(var i=0;i<ib.length;i++)(function(b){b.addEventListener(“click”,function(){entry[b.dataset.int]=parseInt(b.dataset.val,10);refreshInt();});})(ib[i]);

var cb=document.querySelectorAll(”[data-chip]”);
for(var i=0;i<cb.length;i++)(function(b){b.addEventListener(“click”,function(){
var id=b.dataset.id; var chip=b.dataset.chip;
if(chip===“symptom”){var idx=entry.symptoms.indexOf(id);if(idx>=0)entry.symptoms.splice(idx,1);else entry.symptoms.push(id);b.classList.toggle(“on”);}
else if(chip===“trigger”){var idx=entry.triggers.indexOf(id);if(idx>=0)entry.triggers.splice(idx,1);else entry.triggers.push(id);b.classList.toggle(“on”);}
else if(chip===“impact”){entry.impact=entry.impact===id?””:id;var all=document.querySelectorAll(”[data-chip=‘impact’]”);for(var j=0;j<all.length;j++)all[j].classList.toggle(“on”,all[j].dataset.id===entry.impact);}
else if(chip===“med”){
var ex=false;for(var j=0;j<entry.medEntries.length;j++)if(entry.medEntries[j].medId===id){ex=true;break;}
var med=find(MEDS,id); var lbl=med?med.label:id;
if(ex){entry.medEntries=entry.medEntries.filter(function(m){return m.medId!==id;});b.classList.remove(“on”);b.textContent=lbl;}
else{entry.medEntries.push({medId:id,timing:[],effect:””});b.classList.add(“on”);b.textContent=“✓ “+lbl;}
document.getElementById(“med-cards”).innerHTML=medCardsHTML();bindMed();
}
});})(cb[i]);

var memo=document.getElementById(“memo-input”);
if(memo) memo.addEventListener(“input”,function(e){entry.memo=e.target.value;});
bindMed();
}

function bindMed() {
var rb=document.querySelectorAll(”[data-rm]”);
for(var i=0;i<rb.length;i++)(function(b){b.addEventListener(“click”,function(){
var id=b.dataset.rm;
entry.medEntries=entry.medEntries.filter(function(m){return m.medId!==id;});
var chips=document.querySelectorAll(”[data-chip=‘med’]”);
for(var j=0;j<chips.length;j++)if(chips[j].dataset.id===id){chips[j].classList.remove(“on”);var med=find(MEDS,id);chips[j].textContent=med?med.label:id;}
document.getElementById(“med-cards”).innerHTML=medCardsHTML();bindMed();
});})(rb[i]);

var tb=document.querySelectorAll(”[data-tim]”);
for(var i=0;i<tb.length;i++)(function(b){b.addEventListener(“click”,function(){
var id=b.dataset.tim; var tid=b.dataset.tid;
for(var j=0;j<entry.medEntries.length;j++)if(entry.medEntries[j].medId===id){var m=entry.medEntries[j];var idx=m.timing.indexOf(tid);if(idx>=0)m.timing.splice(idx,1);else m.timing.push(tid);break;}
b.classList.toggle(“on”);
});})(tb[i]);

var eb=document.querySelectorAll(”[data-eff]”);
for(var i=0;i<eb.length;i++)(function(b){b.addEventListener(“click”,function(){
var id=b.dataset.eff; var eid=b.dataset.eid;
for(var j=0;j<entry.medEntries.length;j++)if(entry.medEntries[j].medId===id){entry.medEntries[j].effect=entry.medEntries[j].effect===eid?””:eid;break;}
var card=document.getElementById(“mc-”+id);
if(card){var all=card.querySelectorAll(”[data-eff]”);for(var k=0;k<all.length;k++){var bt=all[k];var on=bt.dataset.eid===entry.medEntries.find?false:false;for(var j=0;j<entry.medEntries.length;j++)if(entry.medEntries[j].medId===id){on=entry.medEntries[j].effect===bt.dataset.eid;break;}var ef=find(EFFECTS,bt.dataset.eid);if(!ef)continue;bt.style.borderColor=on?ef.color:”#e5e7eb”;bt.style.background=on?ef.bg:”#fff”;bt.style.color=on?ef.color:”#6b7280”;bt.style.fontWeight=on?“800”:“400”;}}
});})(eb[i]);
}

function refreshInt() {
var fields=[“morning”,“afternoon”,“evening”];
for(var f=0;f<fields.length;f++){var btns=document.querySelectorAll(”[data-int=’”+fields[f]+”’]”);for(var i=0;i<btns.length;i++){var on=entry[fields[f]]===i;btns[i].style.borderColor=on?IT[i]:“transparent”;btns[i].style.fontWeight=on?“800”:“500”;}}
}

function doSave() {
entries[selDate]=clone(entry);save();
var btn=document.getElementById(“save-btn”);
btn.textContent=“✅ 保存しました！”;btn.classList.add(“saved”);
var badge=document.getElementById(“date-saved-badge”);if(badge)badge.style.display=“inline”;
setTimeout(function(){btn.textContent=“💾 この日の記録を保存”;btn.classList.remove(“saved”);},2000);
}

function doExport() {
var lines=[“頭痛ダイアリー エクスポート”,””];
var dates=Object.keys(entries).sort();
for(var di=0;di<dates.length;di++){
var d=dates[di]; var e=entries[d];
lines.push(“■ “+d);
lines.push(”  痛みの程度: 朝=”+IL[e.morning]+” 昼=”+IL[e.afternoon]+” 夜=”+IL[e.evening]);
if(e.symptoms&&e.symptoms.length){var sl=[];for(var i=0;i<e.symptoms.length;i++){var s=find(SYMPTOMS,e.symptoms[i]);if(s)sl.push(s.label);}lines.push(”  症状: “+sl.join(”、”));}
if(e.medEntries&&e.medEntries.length){var ml=[];for(var i=0;i<e.medEntries.length;i++){var m=e.medEntries[i];var med=find(MEDS,m.medId);var nm=med?med.label:m.medId;var tl=[];for(var j=0;j<m.timing.length;j++){var t=find(TIMING,m.timing[j]);if(t)tl.push(t.label);}var ef=find(EFFECTS,m.effect);ml.push(nm+(tl.length?”（”+tl.join(”・”)+”）”:””)+(ef?“→”+ef.label:””));}lines.push(”  服薬: “+ml.join(” / “));}
if(e.triggers&&e.triggers.length){var tl=[];for(var i=0;i<e.triggers.length;i++){var t=find(TRIGGERS,e.triggers[i]);if(t)tl.push(t.label);}lines.push(”  誘因: “+tl.join(”、”));}
if(e.impact){var im=find(IMPACTS,e.impact);if(im)lines.push(”  日常への影響: “+im.label);}
if(e.memo)lines.push(”  メモ: “+e.memo);
lines.push(””);
}
var blob=new Blob([lines.join(”\n”)],{type:“text/plain;charset=utf-8”});
var url=URL.createObjectURL(blob);var a=document.createElement(“a”);a.href=url;a.download=“headache_diary.txt”;a.click();URL.revokeObjectURL(url);
}

function showTab(t) {
tab=t;
var btns=document.querySelectorAll(”.tab-btn”);
btns[0].classList.toggle(“active”,t===“record”);
btns[1].classList.toggle(“active”,t===“summary”);
render();
}

window.addEventListener(“online”,function(){document.getElementById(“offline-banner”).style.display=“none”;});
window.addEventListener(“offline”,function(){document.getElementById(“offline-banner”).style.display=“block”;});

render();
</script>
