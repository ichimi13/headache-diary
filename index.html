<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>頭痛ダイアリー</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: -apple-system, "Hiragino Sans", sans-serif;
  background: #f0f4f8;
  -webkit-font-smoothing: antialiased;
  padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
}
button, textarea, input { font-family: inherit; }

#app-header {
background: linear-gradient(160deg, #4a7c9e 0%, #2d5a78 100%);
color: #fff;
padding-top: calc(env(safe-area-inset-top, 44px) + 10px);
padding-left: 18px;
padding-right: 18px;
padding-bottom: 0;
position: sticky;
top: 0;
z-index: 50;
}
.app-label { font-size: 10px; letter-spacing: 0.15em; opacity: 0.65; margin-bottom: 3px; }
.app-title { font-size: 22px; font-weight: 900; margin-bottom: 14px; }
.tabs { display: flex; }
.tab {
flex: 1; padding: 11px 0; text-align: center;
background: transparent; border: none;
color: rgba(255,255,255,0.7); font-size: 13px; font-weight: 600;
border-radius: 10px 10px 0 0; cursor: pointer;
}
.tab.on { background: #f0f4f8; color: #2d5a78; font-weight: 800; }

#page { padding: 14px 14px 0; }

.card {
background: #fff; border-radius: 16px;
padding: 14px 16px; margin-bottom: 12px;
box-shadow: 0 1px 8px rgba(0,0,0,0.08);
}

.sec-title {
font-size: 12px; font-weight: 800; color: #374151;
border-left: 3px solid #4a7c9e; padding-left: 8px;
margin-bottom: 10px; letter-spacing: 0.04em;
}

/* 痛みの程度 */
.int-label { font-size: 11px; color: #6b7280; font-weight: 600; margin-bottom: 5px; }
.int-row { display: flex; gap: 5px; margin-bottom: 8px; }
.int-btn {
flex: 1; padding: 8px 2px; border-radius: 9px;
border: 2px solid transparent; font-size: 10px;
font-weight: 500; cursor: pointer;
}

/* チップ */
.chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
padding: 6px 11px; border-radius: 18px;
border: 1.5px solid #d1d5db; background: #f9fafb;
color: #6b7280; font-size: 12px; cursor: pointer;
}
.chip.on { border-color: #4a7c9e; background: #dbeafe; color: #1e3a8a; font-weight: 700; }
.chip.on-purple { border-color: #7c3aed; background: #ede9fe; color: #4c1d95; font-weight: 700; }

/* 服薬カード */
.med-card {
background: #eff6ff; border-radius: 12px;
padding: 11px 13px; margin-top: 8px;
border: 1.5px solid #bfdbfe;
}
.med-card-top {
display: flex; justify-content: space-between;
align-items: center; margin-bottom: 8px;
}
.med-card-name { font-size: 13px; font-weight: 800; color: #1e40af; }
.med-del { background: none; border: none; color: #9ca3af; font-size: 20px; cursor: pointer; padding: 0; }
.sub-title { font-size: 11px; color: #6b7280; font-weight: 600; margin-bottom: 5px; }
.tim-row { display: flex; gap: 5px; margin-bottom: 8px; }
.tim-btn {
flex: 1; padding: 7px 3px; border-radius: 9px;
border: 1.5px solid #d1d5db; background: #fff;
color: #6b7280; font-size: 11px; cursor: pointer;
}
.tim-btn.on { border-color: #4a7c9e; background: #dbeafe; color: #1e3a8a; font-weight: 800; }
.eff-row { display: flex; gap: 5px; }
.eff-btn {
flex: 1; padding: 7px 3px; border-radius: 9px;
border: 1.5px solid #d1d5db; background: #fff;
color: #6b7280; font-size: 10px; cursor: pointer; line-height: 1.3;
}

/* メモ */
textarea {
width: 100%; border: 1.5px solid #d1d5db; border-radius: 10px;
padding: 9px 11px; font-size: 13px; color: #374151;
resize: none; outline: none; background: #fff;
}

/* 保存ボタン */
#btn-save {
width: 100%; padding: 14px; border-radius: 13px; border: none;
background: linear-gradient(135deg, #4a7c9e, #2d5a78);
color: #fff; font-size: 15px; font-weight: 800;
cursor: pointer; margin-top: 4px;
}

/* まとめ */
.cal-grid { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 6px; }
.cal-cell {
width: 33px; height: 33px; border-radius: 7px;
display: flex; flex-direction: column;
align-items: center; justify-content: center;
font-size: 10px; font-weight: 700;
border: 1px solid rgba(0,0,0,0.06);
}
.cal-cell small { font-size: 8px; opacity: 0.7; }
.legend { display: flex; flex-wrap: wrap; gap: 8px; font-size: 10px; color: #6b7280; margin-bottom: 16px; }
.legend-dot { display: inline-block; width: 10px; height: 10px; border-radius: 3px; margin-right: 3px; vertical-align: middle; }
.rec-card {
background: #fff; border-radius: 12px;
padding: 12px 14px; margin-bottom: 8px;
border-left: 4px solid #e5e7eb;
box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.rec-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.rec-date { font-size: 14px; font-weight: 700; color: #111827; }
.rec-badge { font-size: 11px; font-weight: 700; border-radius: 7px; padding: 2px 9px; }
.rec-times { font-size: 11px; color: #6b7280; margin-bottom: 4px; }
.rec-row { font-size: 11px; color: #374151; margin-bottom: 3px; }
.rec-memo { font-size: 11px; color: #6b7280; font-style: italic; background: #f9fafb; border-radius: 7px; padding: 5px 8px; margin-top: 3px; }

#btn-export {
width: 100%; padding: 13px; border-radius: 13px;
border: 2px solid #4a7c9e; background: #fff;
color: #4a7c9e; font-size: 14px; font-weight: 700;
cursor: pointer; margin-bottom: 12px;
}
</style>

<script>
// ============================================================
// データ定義
// ============================================================
var IL = ["なし", "軽度 ＋", "中程度 ＋＋", "重度 ＋＋＋"];
var IC = ["#e8f5e9", "#fff9c4", "#ffe0b2", "#ffcdd2"];

var SYMS = [
  ["throbbing", "💓 脈打つ痛み"],
  ["heavy",     "🪨 重い痛み"],
  ["nausea",    "🤢 吐き気・嘔吐"],

  ["bufferin", "バファリン"],
  ["imigran",  "イミグラン"],
  ["zomig",    "ゾーミック"],
  ["maxalt",   "マクサルト"],
  ["ibu",      "イブ"],
  ["alinamin", "アリナミン"],
  ["yunker",   "ユンケル"],
  ["other",    "その他"]
];
var TIMS = [
  ["morning",   "🌅 朝"],
  ["afternoon", "☀️ 昼"],
  ["evening",   "🌙 夜"]
];
var EFFS = [
  ["much_better",   "かなり良くなった", "#16a34a", "#dcfce7"],
  ["little_better", "少し良くなった",   "#ca8a04", "#fef9c3"],
  ["no_change",     "変わらない",       "#9ca3af", "#f3f4f6"]
];
var TRIGS = [
  ["sleep",     "睡眠不足"],
  ["stress",    "ストレス"],
  ["weather",   "天気・気圧"],
  ["alcohol",   "飲酒"],
  ["period",    "生理"],
  ["screen",    "画面疲れ"],
  ["skip_meal", "食事抜き"],
  ["unknown",   "不明"]
];
var IMPS = [
  ["none",     "影響なし"],
  ["slight",   "少し支障あり"],
  ["moderate", "かなり支障あり"],
  ["severe",   "寝込んだ"]
];

// ============================================================
// 状態
// ============================================================
var SK = "hdiary_v2";
var currentTab = "record";
var today = new Date().toISOString().slice(0, 10);
var selDate = today;
var allEntries = loadAll();
var cur = copyObj(allEntries[selDate] || newEntry());

function newEntry() {
  return { mo: 0, af: 0, ev: 0, syms: [], meds: [], trigs: [], impact: "", memo: "" };
  // meds: [{ id, tims:[], eff:"" }, ...]
}
function copyObj(o) { return JSON.parse(JSON.stringify(o)); }
function loadAll() {
  try { return JSON.parse(localStorage.getItem(SK) || "{}"); }
  catch(e) { return {}; }
}
function saveAll() {
  try { localStorage.setItem(SK, JSON.stringify(allEntries)); }
  catch(e) {}
}
function esc(s) {
  return String(s)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}
function findMed(id) {
  for (var i = 0; i < cur.meds.length; i++) {
    if (cur.meds[i].id === id) return cur.meds[i];
  }
  return null;
}

// ============================================================
// レンダリング
// ============================================================
function render() {
  var p = document.getElementById("page");
  p.innerHTML = (currentTab === "record") ? buildRecord() : buildSummary();
  bindAll();
}

// ---- 記録タブ ----
function buildRecord() {
  var h = "";

  // 日付
  h += "<div class='card'>";
  h += "<div style='display:flex;align-items:center;gap:10px'>";
  h += "<span style='font-size:22px'>📅</span>";
  h += "<div style='flex:1'>";
  h += "<div style='font-size:10px;color:#9ca3af;margin-bottom:2px'>記録する日付</div>";
  h += "<input type='date' id='inp-date' value='" + esc(selDate) + "' style='border:none;font-size:16px;font-weight:700;color:#111;background:transparent;outline:none;width:100%'>";
  h += "</div>";
  if (allEntries[selDate]) {
    h += "<span style='font-size:11px;background:#dcfce7;color:#16a34a;border-radius:7px;padding:3px 8px;font-weight:700'>記録済</span>";
  }
  h += "</div></div>";

  // 痛みの程度
  h += "<div class='card'><div class='sec-title'>痛みの程度</div>";
  h += buildIntRow("mo", "朝", cur.mo);
  h += buildIntRow("af", "昼", cur.af);
  h += buildIntRow("ev", "夜", cur.ev);
  h += "</div>";

  // 症状
  h += "<div class='card'><div class='sec-title'>症状</div><div class='chips'>";
  for (var i = 0; i < SYMS.length; i++) {
    var id = SYMS[i][0], lb = SYMS[i][1];
    var on = cur.syms.indexOf(id) >= 0;
    h += "<button class='chip" + (on ? " on" : "") + "' onclick='toggleSym(\"" + id + "\",this)'>" + lb + "</button>";
  }
  h += "</div></div>";

  // 服薬
  h += "<div class='card'><div class='sec-title'>服薬</div>";
  h += "<div class='chips' style='margin-bottom:4px'>";
  for (var i = 0; i < MEDS.length; i++) {
    var id = MEDS[i][0], lb = MEDS[i][1];
    var on = findMed(id) !== null;
    h += "<button class='chip" + (on ? " on" : "") + "' onclick='toggleMed(\"" + id + "\",this)'>" + (on ? "✓ " : "") + lb + "</button>";
  }
  h += "</div>";
  h += "<div id='med-cards'>" + buildMedCards() + "</div>";
  h += "</div>";

  // 誘因
  h += "<div class='card'><div class='sec-title'>考えられる誘因</div><div class='chips'>";
  for (var i = 0; i < TRIGS.length; i++) {
    var id = TRIGS[i][0], lb = TRIGS[i][1];
    var on = cur.trigs.indexOf(id) >= 0;
    h += "<button class='chip" + (on ? " on" : "") + "' onclick='toggleTrig(\"" + id + "\",this)'>" + lb + "</button>";
  }
  h += "</div></div>";

  // 日常への影響
  h += "<div class='card'><div class='sec-title'>日常生活への影響</div><div class='chips'>";
  for (var i = 0; i < IMPS.length; i++) {
    var id = IMPS[i][0], lb = IMPS[i][1];
    var on = cur.impact === id;
    h += "<button class='chip" + (on ? " on-purple" : "") + "' onclick='setImpact(\"" + id + "\")'>" + lb + "</button>";
  }
  h += "</div></div>";

  // メモ
  h += "<div class='card'><div class='sec-title'>自由メモ</div>";
  h += "<textarea id='inp-memo' rows='3' placeholder='気になること、医師への伝言など...'>" + esc(cur.memo) + "</textarea>";

h += “</div>”;

// 保存
h += “<button id='btn-save' onclick='doSave()'>💾 この日の記録を保存</button>”;
h += “<div style='height:16px'></div>”;
return h;
}

function buildIntRow(field, label, val) {
var h = “<div style='margin-bottom:8px'>”;
h += “<div class='int-label'>” + label + “</div>”;
h += “<div class='int-row'>”;
for (var i = 0; i < IL.length; i++) {
var on = val === i;
h += “<button class=‘int-btn’”;
h += “ style=‘background:” + IC[i] + “;color:” + IT[i] + “;border-color:” + (on ? IT[i] : “transparent”) + “;font-weight:” + (on ? “800” : “500”) + “’”;
h += “ onclick=‘setInt("” + field + “",” + i + “)’>” + IL[i] + “</button>”;
}
h += “</div></div>”;
return h;
}

h += “<span class='med-card-name'>💊 “ + esc(lb) + “</span>”;
h += “<button class='med-del' onclick='delMed(\"" + m.id + "\")'>×</button>”;
h += “</div>”;

}

// ============================================================
// イベントバインド
// ============================================================
function bindAll() {
var di = document.getElementById(“inp-date”);
if (di) {
di.onchange = function() {
selDate = this.value;
cur = copyObj(allEntries[selDate] || newEntry());
render();
};
}
var memo = document.getElementById(“inp-memo”);
if (memo) {
memo.oninput = function() { cur.memo = this.value; };
}
}

// ============================================================
// インタラクション（inline onclick で呼ぶ）
// ============================================================
function setInt(field, val) {
cur[field] = val;
// ボタンのスタイルを更新
var btns = document.querySelectorAll(”[onclick*=‘setInt("” + field + “"’]”);
// 再描画が一番確実
var card = document.querySelector(”#page .card:nth-child(2)”);
if (card) {
// int-row だけ更新
var rows = card.querySelectorAll(”.int-row”);
var fields = [“mo”, “af”, “ev”];
for (var f = 0; f < fields.length; f++) {
if (fields[f] !== field) continue;
var rowBtns = rows[f].querySelectorAll(”.int-btn”);
for (var i = 0; i < rowBtns.length; i++) {
var on = i === val;
rowBtns[i].style.borderColor = on ? IT[val] : “transparent”;
rowBtns[i].style.fontWeight  = on ? “800” : “500”;
}
}
}
}

function toggleSym(id, btn) {
var idx = cur.syms.indexOf(id);
if (idx >= 0) { cur.syms.splice(idx, 1); btn.classList.remove(“on”); }
else { cur.syms.push(id); btn.classList.add(“on”); }
}

function toggleTrig(id, btn) {
var idx = cur.trigs.indexOf(id);
if (idx >= 0) { cur.trigs.splice(idx, 1); btn.classList.remove(“on”); }
else { cur.trigs.push(id); btn.classList.add(“on”); }
}

function setImpact(id) {
cur.impact = (cur.impact === id) ? “” : id;
var btns = document.querySelectorAll(”[onclick*=‘setImpact’]”);
for (var i = 0; i < btns.length; i++) {
var bid = btns[i].getAttribute(“onclick”).replace(“setImpact("”,””).replace(”")”,””);
btns[i].className = “chip” + (bid === cur.impact ? “ on-purple” : “”);
}
}

function toggleMed(id, btn) {
var existing = findMed(id);
if (existing) {
cur.meds = cur.meds.filter(function(m) { return m.id !== id; });
btn.classList.remove(“on”);
// ラベル復元
for (var i = 0; i < MEDS.length; i++) {
if (MEDS[i][0] === id) { btn.textContent = MEDS[i][1]; break; }
}
} else {
cur.meds.push({ id: id, tims: [], eff: “” });
btn.classList.add(“on”);
for (var i = 0; i < MEDS.length; i++) {
if (MEDS[i][0] === id) { btn.textContent = “✓ “ + MEDS[i][1]; break; }
}
}
document.getElementById(“med-cards”).innerHTML = buildMedCards();
}

function delMed(id) {
cur.meds = cur.meds.filter(function(m) { return m.id !== id; });
// チップも戻す
var btns = document.querySelectorAll(”[onclick*=‘toggleMed’]”);
for (var i = 0; i < btns.length; i++) {
var bid = btns[i].getAttribute(“onclick”).replace(/toggleMed(”([^”]+)”.*/,”$1”);
if (bid === id) {
btns[i].classList.remove(“on”);
for (var j = 0; j < MEDS.length; j++) {
if (MEDS[j][0] === id) { btns[i].textContent = MEDS[j][1]; break; }
}
}
}
document.getElementById(“med-cards”).innerHTML = buildMedCards();
}

function toggleTim(medId, tid, btn) {
var m = findMed(medId);
if (!m) return;
var idx = m.tims.indexOf(tid);
if (idx >= 0) { m.tims.splice(idx, 1); btn.classList.remove(“on”); }
else { m.tims.push(tid); btn.classList.add(“on”); }
}

function setEff(medId, eid) {
var m = findMed(medId);
if (!m) return;
m.eff = (m.eff === eid) ? “” : eid;
for (var i = 0; i < EFFS.length; i++) {
var el = document.getElementById(“eff-” + medId + “-” + EFFS[i][0]);
if (!el) continue;
var on = m.eff === EFFS[i][0];
el.style.borderColor = on ? EFFS[i][2] : “#d1d5db”;
el.style.background  = on ? EFFS[i][3] : “#fff”;
el.style.color       = on ? EFFS[i][2] : “#6b7280”;
el.style.fontWeight  = on ? “800” : “400”;
}
}
