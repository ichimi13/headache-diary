#header {
  background: linear-gradient(135deg, var(--hdr2) 0%, var(--hdr1) 100%);

.tab-btn {
  flex: 1; padding: 10px 0; background: transparent;

  border-radius: 10px 10px 0 0; font-weight: 500;
  font-size: 13px; cursor: pointer; transition: all .2s;
}
.tab-btn.active { background: #fff; color: var(--hdr2); font-weight: 800; }

#content { padding: 16px 16px 0; }

.card {
  background: #fff; border-radius: 16px;
  padding: 14px 16px; margin-bottom: 14px;

<body>

<script>
// ── データ定義 ────────────────────────────────────────────────────────────────
var IL = ["なし", "軽度 ＋", "中程度 ＋＋", "重度 ＋＋＋"];
var IC = ["#e8f5e9", "#fff9c4", "#ffe0b2", "#ffcdd2"];
var IT = ["#388e3c", "#f9a825", "#e65100", "#c62828"];
var BC = ["#e5e7eb", "#fde68a", "#fdba74", "#fca5a5"];

var SYMPTOMS = [
  { id: "throbbing", label: "💓 脈打つ痛み" },
  { id: "heavy",     label: "🪨 重い痛み" },
  { id: "nausea",    label: "🤢 吐き気・嘔吐" },
  { id: "light",     label: "💡 光過敏" },
  { id: "sound",     label: "🔊 音過敏" },
  { id: "aura",      label: "✨ 前兆あり" }
];

var MEDS = [
  { id: "loxonin",  label: "ロキソニン" },
  { id: "bufferin", label: "バファリン" },
  { id: "imigran",  label: "イミグラン" },
  { id: "zomig",    label: "ゾーミック" },
  { id: "maxalt",   label: "マクサルト" },
  { id: "ibu",      label: "イブ" },
  { id: "alinamin", label: "アリナミン" },
  { id: "yunker",   label: "ユンケル" },
  { id: "other",    label: "その他" }
];

var TIMING = [
  { id: "morning",   label: "🌅 朝" },
  { id: "afternoon", label: "☀️ 昼" },
  { id: "evening",   label: "🌙 夜" }
];

var EFFECTS = [
  { id: "much_better",   label: "かなり良くなった", color: "#16a34a", bg: "#dcfce7" },
  { id: "little_better", label: "少し良くなった",   color: "#ca8a04", bg: "#fef9c3" },
  { id: "no_change",     label: "変わらない",       color: "#9ca3af", bg: "#f3f4f6" }
];

var TRIGGERS = [
  { id: "sleep",     label: "睡眠不足" },
  { id: "stress",    label: "ストレス" },
  { id: "weather",   label: "天気・気圧" },
  { id: "alcohol",   label: "飲酒" },
  { id: "period",    label: "生理" },
  { id: "screen",    label: "画面疲れ" },
  { id: "skip_meal", label: "食事抜き" },
  { id: "unknown",   label: "不明" }
];

var IMPACTS = [
  { id: "none",     label: "影響なし" },
  { id: "slight",   label: "少し支障あり" },
  { id: "moderate", label: "かなり支障あり" },
  { id: "severe",   label: "寝込んだ" }
];

// ── 状態 ──────────────────────────────────────────────────────────────────────
var SK = "headache_diary_v1";
var currentTab = "record";
var selDate = todayStr();
var entries = loadAll();
var entry = deepClone(entries[selDate] || makeEmpty());

function todayStr() {
  return new Date().toISOString().slice(0, 10);
}
function makeEmpty() {
  return { morning: 0, afternoon: 0, evening: 0, symptoms: [], medEntries: [], triggers: [], impact: "", memo: "" };
}
function deepClone(o) {
  return JSON.parse(JSON.stringify(o));
}
function loadAll() {
  try { return JSON.parse(localStorage.getItem(SK) || "{}"); } catch (e) { return {}; }
}
function saveAll() {
  try { localStorage.setItem(SK, JSON.stringify(entries)); } catch (e) {}
}
function escHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}
function findById(arr, id) {
  for (var i = 0; i < arr.length; i++) {
    if (arr[i].id === id) return arr[i];
  }
  return null;
}
function hasMed(medId) {
  for (var i = 0; i < entry.medEntries.length; i++) {
    if (entry.medEntries[i].medId === medId) return true;
  }
  return false;
}
function getMedEntry(medId) {
  for (var i = 0; i < entry.medEntries.length; i++) {
    if (entry.medEntries[i].medId === medId) return entry.medEntries[i];
  }
  return null;
}

// ── レンダリング ──────────────────────────────────────────────────────────────
function render() {
  document.getElementById("content").innerHTML =
    currentTab === "record" ? buildRecord() : buildSummary();
  attachEvents();
}

// ── 記録タブ ──────────────────────────────────────────────────────────────────
function buildRecord() {
  var h = "";

  // 日付カード
  h += "<div class='card'>";
  h += "<div id='date-row'>";
  h += "<span style='font-size:20px'>📅</span>";
  h += "<div id='date-col'>";
  h += "<div id='date-sublabel'>記録する日付</div>";
  h += "<input type='date' id='date-input' value='" + escHtml(selDate) + "'>";
  h += "</div>";
  if (entries[selDate]) {
    h += "<span id='date-saved-badge' style='display:inline'>記録済</span>";
  } else {
    h += "<span id='date-saved-badge'>記録済</span>";
  }
  h += "</div></div>";

  // フォームカード
  h += "<div class='card-form'>";

  // 痛みの程度
  h += "<div class='section'>";
  h += "<div class='section-title'>痛みの程度</div>";
  h += buildIntRow("morning",   "朝", entry.morning);
  h += buildIntRow("afternoon", "昼", entry.afternoon);
  h += buildIntRow("evening",   "夜", entry.evening);
  h += "</div>";

  // 症状
  h += "<div class='section'>";
  h += "<div class='section-title'>症状</div>";
  h += "<div class='chip-group'>";
  for (var i = 0; i < SYMPTOMS.length; i++) {
    var s = SYMPTOMS[i];
    var on = entry.symptoms.indexOf(s.id) >= 0;
    h += "<button class='chip" + (on ? " on" : "") + "' data-type='symptom' data-id='" + s.id + "'>";
    h += s.label + "</button>";
  }
  h += "</div></div>";

  // 服薬
  h += "<div class='section'>";
  h += "<div class='section-title'>服薬</div>";
  h += "<div class='chip-group' style='margin-bottom:14px'>";
  for (var i = 0; i < MEDS.length; i++) {
    var m = MEDS[i];
    var on = hasMed(m.id);
    h += "<button class='chip" + (on ? " on" : "") + "' data-type='med' data-id='" + m.id + "'>";
    h += (on ? "✓ " : "") + escHtml(m.label) + "</button>";
  }
  h += "</div>";
  h += "<div id='med-cards'>" + buildMedCards() + "</div>";
  h += "</div>";

  // 誘因
  h += "<div class='section'>";
  h += "<div class='section-title'>考えられる誘因</div>";
  h += "<div class='chip-group'>";
  for (var i = 0; i < TRIGGERS.length; i++) {
    var t = TRIGGERS[i];
    var on = entry.triggers.indexOf(t.id) >= 0;
    h += "<button class='chip" + (on ? " on" : "") + "' data-type='trigger' data-id='" + t.id + "'>";
    h += t.label + "</button>";
  }
  h += "</div></div>";

  // 日常への影響
  h += "<div class='section'>";
  h += "<div class='section-title'>日常生活への影響</div>";
  h += "<div class='chip-group'>";
  for (var i = 0; i < IMPACTS.length; i++) {
    var imp = IMPACTS[i];
    var on = entry.impact === imp.id;
    h += "<button class='chip single" + (on ? " on" : "") + "' data-type='impact' data-id='" + imp.id + "'>";
    h += imp.label + "</button>";
  }
  h += "</div></div>";

  // メモ
  h += "<div class='section'>";
  h += "<div class='section-title'>自由メモ</div>";
  h += "<textarea id='memo-input' rows='3' placeholder='その他気になること、医師への伝言など...'>" + escHtml(entry.memo) + "</textarea>";

h += “</div>”;

h += “<button id='save-btn' onclick='doSave()'>💾 この日の記録を保存</button>”;
h += “</div>”;
h += “<div style='height:20px'></div>”;
return h;
}

function buildIntRow(field, label, val) {
var h = “<div class='int-row'>”;
h += “<div class='int-label'>” + label + “</div>”;
h += “<div class='int-btns'>”;
for (var i = 0; i < IL.length; i++) {
var on = val === i;
h += “<button class=‘int-btn’”;
h += “ style=‘background:” + IC[i] + “;color:” + IT[i] + “;”;
h += “border-color:” + (on ? IT[i] : “transparent”) + “;”;
h += “font-weight:” + (on ? “800” : “500”) + “’”;
h += “ data-int=’” + field + “’ data-val=’” + i + “’>”;
h += IL[i] + “</button>”;
}
h += “</div></div>”;
return h;
}

function buildMedCards() {
var h = “”;
for (var i = 0; i < entry.medEntries.length; i++) {
h += buildOneMedCard(entry.medEntries[i]);
}
return h;
}

}
h += “</div>”;

h += “</div>”;
return h;
}
