<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="頭痛ダイアリー">
<meta name="theme-color" content="#2d5a78">

<title>頭痛ダイアリー</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  -webkit-tap-highlight-color:transparent;
}

body{
  font-family:'Hiragino Sans','Noto Sans JP',sans-serif;
  background:linear-gradient(135deg,#f0f7ff 0%,#faf5ff 100%);
  min-height:100vh;
  color:#222;
}

#header{
  background:linear-gradient(135deg,#4a7c9e 0%,#2d5a78 100%);
  padding:52px 20px 0;
  color:#fff;
}

#header-sub{
  font-size:10px;
  letter-spacing:.15em;
  opacity:.7;
  margin-bottom:2px;
}

#header-title{
  font-size:22px;
  font-weight:900;
  margin-bottom:16px;
}

#tabs{
  display:flex;
}

.tab-btn{
  flex:1;
  padding:10px 0;
  border:none;
  border-radius:10px 10px 0 0;
  background:transparent;
  color:rgba(255,255,255,.8);
  font-size:13px;
  font-weight:500;
}

.tab-btn.active{
  background:#fff;
  color:#4a7c9e;
  font-weight:800;
}

#content{
  padding:16px;
}

.card{
  background:#fff;
  border-radius:16px;
  padding:14px 16px;
  margin-bottom:14px;
  box-shadow:0 2px 12px rgba(0,0,0,.06);
}

.card-form{
  background:#fff;
  border-radius:18px;
  padding:20px 16px;
  box-shadow:0 2px 16px rgba(0,0,0,.07);
}

.section{
  margin-bottom:22px;
}

.section-title{
  font-size:13px;
  font-weight:800;
  color:#374151;
  margin-bottom:10px;
  padding-left:10px;
  border-left:3px solid #4a7c9e;
}

.intensity-row{
  margin-bottom:10px;
}

.intensity-label{
  font-size:12px;
  color:#6b7280;
  margin-bottom:6px;
  font-weight:600;
}

.intensity-btns{
  display:flex;
  gap:6px;
}

.intensity-btn{
  flex:1;
  padding:8px 4px;
  border-radius:10px;
  border:2px solid transparent;
  font-size:11px;
  font-weight:500;
}

.chip-group{
  display:flex;
  flex-wrap:wrap;
  gap:7px;
}

.chip{
  padding:6px 12px;
  border-radius:20px;
  border:2px solid #e5e7eb;
  background:#f9fafb;
  color:#6b7280;
  font-size:12px;
}

.chip.on{
  border-color:#4a7c9e;
  background:#dbeafe;
  color:#1e40af;
  font-weight:700;
}

.chip.single.on{
  border-color:#7c3aed;
  background:#ede9fe;
  color:#5b21b6;
}

textarea{
  width:100%;
  border:1.5px solid #e5e7eb;
  border-radius:12px;
  padding:10px 12px;
  font-size:13px;
  resize:vertical;
}

#save-btn{
  width:100%;
  padding:14px 0;
  border:none;
  border-radius:14px;
  background:linear-gradient(135deg,#4a7c9e,#2d5a78);
  color:#fff;
  font-size:15px;
  font-weight:800;
}

.entry-card{
  background:#fff;
  border-radius:14px;
  padding:14px 16px;
  margin-bottom:10px;
  border:1px solid #e5e7eb;
}

.entry-date{
  font-weight:700;
  font-size:14px;
  margin-bottom:6px;
}

.entry-row{
  font-size:12px;
  color:#374151;
  margin-bottom:4px;
}

.empty{
  text-align:center;
  color:#9ca3af;
  padding:60px 0;
}

#date-input{
  width:100%;
  border:none;
  font-size:16px;
  font-weight:700;
  background:transparent;
}

.hidden{
  display:none;
}
</style>
</head>

<body>

<div id="header">
  <div id="header-sub">HEADACHE DIARY</div>
  <div id="header-title">頭痛ダイアリー 🗓️</div>

  <div id="tabs">
    <button class="tab-btn active" id="record-tab">📝 記録する</button>
    <button class="tab-btn" id="summary-tab">📊 まとめ</button>
  </div>
</div>

<div id="content">

<div id="record-page">

  <div class="card">
    <input type="date" id="date-input">
  </div>

  <div class="card-form">

    <div class="section">
      <div class="section-title">痛みの程度</div>

      <div class="intensity-row">
        <div class="intensity-label">朝</div>
        <div class="intensity-btns" id="morning-btns"></div>
      </div>

      <div class="intensity-row">
        <div class="intensity-label">昼</div>
        <div class="intensity-btns" id="afternoon-btns"></div>
      </div>

      <div class="intensity-row">
        <div class="intensity-label">夜</div>
        <div class="intensity-btns" id="evening-btns"></div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">症状</div>
      <div class="chip-group" id="symptoms"></div>
    </div>

    <div class="section">
      <div class="section-title">考えられる誘因</div>
      <div class="chip-group" id="triggers"></div>
    </div>

    <div class="section">
      <div class="section-title">日常生活への影響</div>
      <div class="chip-group" id="impacts"></div>
    </div>

    <div class="section">
      <div class="section-title">自由メモ</div>
      <textarea id="memo" rows="3"></textarea>
    </div>

    <button id="save-btn">💾 この日の記録を保存</button>

  </div>
</div>

<div id="summary-page" class="hidden">
  <div id="summary-list"></div>
</div>

</div>

<script>
const STORAGE_KEY = "headache_diary_v2";

const INTENSITY_LABELS = [
  "なし",
  "軽度 ＋",
  "中程度 ＋＋",
  "重度 ＋＋＋"
];

const INTENSITY_COLORS = [
  "#e8f5e9",
  "#fff9c4",
  "#ffe0b2",
  "#ffcdd2"
];

const INTENSITY_TEXT = [
  "#388e3c",
  "#f9a825",
  "#e65100",
  "#c62828"
];

const SYMPTOMS = [
  "💓 脈打つ痛み",
  "🪨 重い痛み",
  "🤢 吐き気・嘔吐",
  "💡 光過敏",
  "🔊 音過敏",
  "✨ 前兆あり"
];

const TRIGGERS = [
  "睡眠不足",
  "ストレス",
  "天気・気圧",
  "飲酒",
  "生理",
  "画面疲れ",
  "食事抜き",
  "不明"
];

const IMPACTS = [
  "影響なし",
  "少し支障あり",
  "かなり支障あり",
  "寝込んだ"
];

let entries = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");

let current = {
  morning:0,
  afternoon:0,
  evening:0,
  symptoms:[],
  triggers:[],
  impact:"",
  memo:""
};

const today = new Date().toISOString().slice(0,10);
const dateInput = document.getElementById("date-input");
dateInput.value = today;

function saveStorage(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
}

function renderIntensity(id, field){
  const wrap = document.getElementById(id);
  wrap.innerHTML = "";

  INTENSITY_LABELS.forEach((label,index)=>{
    const btn = document.createElement("button");

    btn.className = "intensity-btn";

    btn.style.background = INTENSITY_COLORS[index];
    btn.style.color = INTENSITY_TEXT[index];

    if(current[field] === index){
      btn.style.borderColor = INTENSITY_TEXT[index];
      btn.style.fontWeight = "800";
    }

    btn.textContent = label;

    btn.onclick = ()=>{
      current[field] = index;
      renderAll();
    };

    wrap.appendChild(btn);
  });
}

function renderChips(id,list,field,single=false){
  const wrap = document.getElementById(id);
  wrap.innerHTML = "";

  list.forEach(item=>{
    const btn = document.createElement("button");

    btn.className = "chip";

    if(single){
      btn.classList.add("single");

      if(current[field] === item){
        btn.classList.add("on");
      }

      btn.onclick = ()=>{
        current[field] = item;
        renderAll();
      };

    }else{

      if(current[field].includes(item)){
        btn.classList.add("on");
      }

      btn.onclick = ()=>{
        if(current[field].includes(item)){
          current[field] = current[field].filter(v=>v!==item);
        }else{
          current[field].push(item);
        }

        renderAll();
      };
    }

    btn.textContent = item;

    wrap.appendChild(btn);
  });
}

function renderSummary(){

  const wrap = document.getElementById("summary-list");

  const dates = Object.keys(entries).sort().reverse();

  if(dates.length===0){
    wrap.innerHTML = '<div class="card empty">まだ記録がありません</div>';
    return;
  }

  wrap.innerHTML = "";

  dates.forEach(date=>{

    const e = entries[date];

    const max = Math.max(
      e.morning,
      e.afternoon,
      e.evening
    );

    const card = document.createElement("div");

    card.className = "entry-card";

    card.style.borderLeft =
      "4px solid " + INTENSITY_TEXT[max];

    card.innerHTML = `
      <div class="entry-date">${date}</div>

      <div class="entry-row">
        朝: ${INTENSITY_LABELS[e.morning]}
      </div>

      <div class="entry-row">
        昼: ${INTENSITY_LABELS[e.afternoon]}
      </div>

      <div class="entry-row">
        夜: ${INTENSITY_LABELS[e.evening]}
      </div>

      <div class="entry-row">
        症状: ${e.symptoms.join("・") || "なし"}
      </div>

      <div class="entry-row">
        誘因: ${e.triggers.join("・") || "なし"}
      </div>

      <div class="entry-row">
        日常への影響: ${e.impact || "なし"}
      </div>

      <div class="entry-row">
        メモ: ${e.memo || "なし"}
      </div>
    `;

    wrap.appendChild(card);

  });

}

function renderAll(){

  renderIntensity("morning-btns","morning");
  renderIntensity("afternoon-btns","afternoon");
  renderIntensity("evening-btns","evening");

  renderChips("symptoms",SYMPTOMS,"symptoms");
  renderChips("triggers",TRIGGERS,"triggers");
  renderChips("impacts",IMPACTS,"impact",true);

  document.getElementById("memo").value = current.memo;

  renderSummary();
}

document.getElementById("memo").addEventListener("input",e=>{
  current.memo = e.target.value;
});

document.getElementById("save-btn").onclick = ()=>{

  const date = dateInput.value;

  entries[date] = JSON.parse(JSON.stringify(current));

  saveStorage();

  alert("保存しました！");
};

document.getElementById("record-tab").onclick = ()=>{

  document.getElementById("record-page").classList.remove("hidden");
  document.getElementById("summary-page").classList.add("hidden");

  document.getElementById("record-tab").classList.add("active");
  document.getElementById("summary-tab").classList.remove("active");
};

document.getElementById("summary-tab").onclick = ()=>{

  document.getElementById("summary-page").classList.remove("hidden");
  document.getElementById("record-page").classList.add("hidden");

  document.getElementById("summary-tab").classList.add("active");
  document.getElementById("record-tab").classList.remove("active");

  renderSummary();
};

dateInput.addEventListener("change",()=>{

  const saved = entries[dateInput.value];

  if(saved){
    current = JSON.parse(JSON.stringify(saved));
  }else{
    current = {
      morning:0,
      afternoon:0,
      evening:0,
      symptoms:[],
      triggers:[],
      impact:"",
      memo:""
    };
  }

  renderAll();
});

renderAll();
</script>

</body>
</html>
