<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="頭痛ダイアリー">

<title>頭痛ダイアリー</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
  -webkit-tap-highlight-color:transparent;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
  background:#f4f7fb;
  color:#222;
}

header{
  background:linear-gradient(135deg,#4a7c9e,#2d5a78);
  color:white;
  padding:50px 20px 20px;
}

header h1{
  font-size:24px;
  font-weight:800;
}

.tabs{
  display:flex;
  margin-top:18px;
  gap:10px;
}

.tab{
  flex:1;
  border:none;
  padding:12px;
  border-radius:12px;
  background:rgba(255,255,255,.2);
  color:white;
  font-weight:700;
}

.tab.active{
  background:white;
  color:#2d5a78;
}

.container{
  padding:16px;
}

.card{
  background:white;
  border-radius:18px;
  padding:16px;
  margin-bottom:16px;
  box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.section{
  margin-bottom:24px;
}

.section-title{
  font-size:14px;
  font-weight:800;
  margin-bottom:10px;
  color:#374151;
}

.intensity-row{
  margin-bottom:12px;
}

.intensity-label{
  font-size:13px;
  margin-bottom:6px;
  color:#666;
}

.intensity-buttons{
  display:flex;
  gap:6px;
}

.intensity-btn{
  flex:1;
  border:none;
  border-radius:10px;
  padding:10px 4px;
  font-size:11px;
  font-weight:700;
}

.level0{background:#e8f5e9;color:#2e7d32;}
.level1{background:#fff9c4;color:#f9a825;}
.level2{background:#ffe0b2;color:#ef6c00;}
.level3{background:#ffcdd2;color:#c62828;}

.selected{
  outline:3px solid #111;
}

.chips{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}

.chip{
  border:none;
  border-radius:999px;
  padding:8px 14px;
  background:#edf2f7;
  font-size:13px;
}

.chip.on{
  background:#dbeafe;
  color:#1d4ed8;
  font-weight:700;
}

textarea{
  width:100%;
  border:1px solid #d1d5db;
  border-radius:12px;
  padding:12px;
  font-size:14px;
  min-height:100px;
}

.save-btn{
  width:100%;
  border:none;
  border-radius:14px;
  padding:16px;
  background:linear-gradient(135deg,#4a7c9e,#2d5a78);
  color:white;
  font-size:16px;
  font-weight:800;
}

.entry{
  border-left:5px solid #4a7c9e;
  padding-left:12px;
  margin-bottom:18px;
}

.entry-date{
  font-weight:800;
  margin-bottom:8px;
}

.small{
  font-size:13px;
  color:#555;
  margin-bottom:4px;
}

.hidden{
  display:none;
}

.date-input{
  width:100%;
  border:none;
  font-size:18px;
  font-weight:700;
}
</style>
</head>

<body>

<header>
  <h1>頭痛ダイアリー 🗓️</h1>

  <div class="tabs">
    <button class="tab active" id="recordTab">📝 記録</button>
    <button class="tab" id="summaryTab">📊 まとめ</button>
  </div>
</header>

<div class="container">

  <div id="recordPage">

    <div class="card">
      <input type="date" id="dateInput" class="date-input">
    </div>

    <div class="card">

      <div class="section">
        <div class="section-title">痛みの程度</div>

        <div class="intensity-row">
          <div class="intensity-label">朝</div>
          <div class="intensity-buttons" id="morningButtons"></div>
        </div>

        <div class="intensity-row">
          <div class="intensity-label">昼</div>
          <div class="intensity-buttons" id="afternoonButtons"></div>
        </div>

        <div class="intensity-row">
          <div class="intensity-label">夜</div>
          <div class="intensity-buttons" id="eveningButtons"></div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">症状</div>
        <div class="chips" id="symptomChips"></div>
      </div>

      <div class="section">
        <div class="section-title">誘因</div>
        <div class="chips" id="triggerChips"></div>
      </div>

      <div class="section">
        <div class="section-title">メモ</div>
        <textarea id="memo"></textarea>
      </div>

      <button class="save-btn" id="saveBtn">💾 保存する</button>

    </div>
  </div>

  <div id="summaryPage" class="hidden">
    <div class="card">
      <div id="summaryList"></div>
    </div>
  </div>

</div>

<script>
const STORAGE_KEY = "headache-diary-final";

const labels = ["なし","軽度","中程度","重度"];

const symptoms = [
  "💓 脈打つ痛み",
  "🤢 吐き気",
  "💡 光過敏",
  "🔊 音過敏",
  "✨ 前兆"
];

const triggers = [
  "睡眠不足",
  "ストレス",
  "気圧",
  "飲酒",
  "画面疲れ"
];

let entries = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");

let current = {
  morning:0,
  afternoon:0,
  evening:0,
  symptoms:[],
  triggers:[],
  memo:""
};

const today = new Date().toISOString().slice(0,10);
document.getElementById("dateInput").value = today;

function saveStorage(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
}

function createIntensityButtons(id, field){
  const container = document.getElementById(id);

  labels.forEach((label,index)=>{
    const btn = document.createElement("button");

    btn.className = "intensity-btn level"+index;

    if(current[field] === index){
      btn.classList.add("selected");
    }

    btn.textContent = label;

    btn.onclick = ()=>{
      current[field] = index;
      renderAll();
    };

    container.appendChild(btn);
  });
}

function createChips(id, list, field){
  const container = document.getElementById(id);

  list.forEach(item=>{
    const btn = document.createElement("button");

    btn.className = "chip";

    if(current[field].includes(item)){
      btn.classList.add("on");
    }

    btn.textContent = item;

    btn.onclick = ()=>{
      if(current[field].includes(item)){
        current[field] = current[field].filter(v=>v!==item);
      }else{
        current[field].push(item);
      }

      renderAll();
    };

    container.appendChild(btn);
  });
}

function renderSummary(){
  const list = document.getElementById("summaryList");

  const dates = Object.keys(entries).sort().reverse();

  if(dates.length===0){
    list.innerHTML = "<div>まだ記録がありません</div>";
    return;
  }

  list.innerHTML = "";

  dates.forEach(date=>{
    const e = entries[date];

    const div = document.createElement("div");
    div.className = "entry";

    div.innerHTML = `
      <div class="entry-date">${date}</div>
      <div class="small">朝: ${labels[e.morning]}</div>
      <div class="small">昼: ${labels[e.afternoon]}</div>
      <div class="small">夜: ${labels[e.evening]}</div>
      <div class="small">症状: ${e.symptoms.join("、") || "なし"}</div>
      <div class="small">誘因: ${e.triggers.join("、") || "なし"}</div>
      <div class="small">メモ: ${e.memo || "なし"}</div>
    `;

    list.appendChild(div);
  });
}

function renderAll(){
  document.getElementById("morningButtons").innerHTML = "";
  document.getElementById("afternoonButtons").innerHTML = "";
  document.getElementById("eveningButtons").innerHTML = "";

  document.getElementById("symptomChips").innerHTML = "";
  document.getElementById("triggerChips").innerHTML = "";

  createIntensityButtons("morningButtons","morning");
  createIntensityButtons("afternoonButtons","afternoon");
  createIntensityButtons("eveningButtons","evening");

  createChips("symptomChips",symptoms,"symptoms");
  createChips("triggerChips",triggers,"triggers");

  document.getElementById("memo").value = current.memo;

  renderSummary();
}

document.getElementById("memo").addEventListener("input",e=>{
  current.memo = e.target.value;
});

document.getElementById("saveBtn").onclick = ()=>{
  const date = document.getElementById("dateInput").value;

  entries[date] = JSON.parse(JSON.stringify(current));

  saveStorage();

  alert("保存しました！");
};

document.getElementById("recordTab").onclick = ()=>{
  document.getElementById("recordPage").classList.remove("hidden");
  document.getElementById("summaryPage").classList.add("hidden");

  document.getElementById("recordTab").classList.add("active");
  document.getElementById("summaryTab").classList.remove("active");
};

document.getElementById("summaryTab").onclick = ()=>{
  document.getElementById("summaryPage").classList.remove("hidden");
  document.getElementById("recordPage").classList.add("hidden");

  document.getElementById("summaryTab").classList.add("active");
  document.getElementById("recordTab").classList.remove("active");

  renderSummary();
};

renderAll();
</script>

</body>
</html>
